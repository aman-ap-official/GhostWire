<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=yes">
    <title>GhostWire | Encrypted Nexus</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,600;14..32,700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        * {
            -webkit-tap-highlight-color: transparent;
        }

        /* GLOBAL FONT SIZE INCREASE */
        body {
            background: #03030c;
            font-family: 'Inter', sans-serif;
            font-size: 1px;   /* base increase */
            overflow: hidden;
            position: relative;
        }

        /* make all text slightly larger while keeping responsive */
        .text-xs {
            font-size: 0.8rem !important;
        }
        .text-sm {
            font-size: 0.7rem !important;
        }
        .text-base {
            font-size: 1rem !important;
        }
        
        /* Animated cyber-grid background */
        .cyber-grid {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: 
                linear-gradient(#0ff1 1px, transparent 1px),
                linear-gradient(90deg, #0ff1 1px, transparent 1px);
            background-size: 40px 40px;
            z-index: -2;
            opacity: 0.3;
            animation: gridShift 20s linear infinite;
        }

        @keyframes gridShift {
            0% { transform: translate(0, 0); }
            100% { transform: translate(40px, 40px); }
        }

        .cyber-glow {
            position: fixed;
            top: -20%;
            left: -20%;
            width: 140%;
            height: 140%;
            background: radial-gradient(circle at 30% 40%, rgba(0, 180, 255, 0.08), transparent 70%);
            z-index: -1;
            pointer-events: none;
        }

        /* Glassmorphic refined */
        .glass-panel {
            background: rgba(8, 12, 25, 0.65);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(0, 230, 250, 0.2);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
        }

        /* Chat scroll custom */
        #chat-box::-webkit-scrollbar {
            width: 5px;
        }
        #chat-box::-webkit-scrollbar-track {
            background: #0f1422;
            border-radius: 10px;
        }
        #chat-box::-webkit-scrollbar-thumb {
            background: #0ff;
            border-radius: 10px;
            box-shadow: 0 0 6px #0ff;
        }

        #log-box::-webkit-scrollbar {
            width: 4px;
        }
        #log-box::-webkit-scrollbar-thumb {
            background: #2dd4bf66;
            border-radius: 6px;
        }

        /* MESSAGE BUBBLES — LIGHT TEXT & LARGER FONT */
        .bubble-tech-self {
            background: linear-gradient(135deg, rgba(0, 210, 255, 0.2), rgba(0, 150, 210, 0.12));
            border: 1px solid rgba(0, 230, 250, 0.6);
            border-radius: 24px 24px 6px 24px;
            box-shadow: 0 6px 14px rgba(0, 200, 255, 0.15);
            backdrop-filter: blur(4px);
            color: #f0f9ff !important;
        }
        
        .bubble-tech-peer {
            background: rgba(20, 28, 45, 0.9);
            border: 1px solid rgba(100, 150, 255, 0.4);
            border-radius: 24px 24px 24px 6px;
            backdrop-filter: blur(4px);
            color: #f0f9ff !important;
        }

        /* force bright text inside all message bubbles */
        .bubble-tech-self div, .bubble-tech-peer div {
            color: #f1f5f9 !important;
        }
        .bubble-tech-self .text-cyan-400, .bubble-tech-peer .text-cyan-400 {
            color: #7dd3fc !important;
        }

        /* system message style — also bright */
        .system-message {
            background: rgba(0, 0, 0, 0.5);
            border-radius: 30px;
            padding: 6px 18px;
            font-size: 0.85rem;
            letter-spacing: 0.5px;
            font-family: 'Space Mono', monospace;
            color: #cbd5e6 !important;
            border: 1px solid rgba(0, 255, 255, 0.2);
        }

        /* log line — increased size */
        .log-line {
            font-family: 'Space Mono', monospace;
            font-size: 0.75rem;
            border-left: 2px solid #0ff;
            padding-left: 10px;
            margin-bottom: 8px;
            transition: all 0.2s;
            opacity: 0.9;
        }

        /* neon input larger */
        .neon-input {
            background: rgba(5, 10, 25, 0.8);
            border: 1px solid #1e3a5f;
            transition: all 0.25s ease;
            font-size: 1rem;
            padding: 0.85rem 1rem;
        }
        .neon-input:focus {
            border-color: #0ff;
            box-shadow: 0 0 14px rgba(0, 255, 255, 0.3);
            outline: none;
            background: rgba(2, 6, 20, 0.95);
        }

        /* send button glowing & larger */
        .btn-glow-enabled {
            background: linear-gradient(90deg, #0cf, #0a9);
            box-shadow: 0 0 16px #0cf8;
            transition: all 0.2s;
            font-size: 0.85rem;
            padding: 0.85rem 1.8rem;
        }
        .btn-glow-enabled:active {
            transform: scale(0.96);
        }

        /* Sidebar toggle improvements */
        @media (max-width: 1023px) {
            .console-closed {
                height: 0 !important;
                padding-top: 0 !important;
                padding-bottom: 0 !important;
                border-bottom-width: 0 !important;
                overflow: hidden;
                opacity: 0;
                transition: height 0.35s cubic-bezier(0.2, 0.9, 0.4, 1.1), opacity 0.2s;
            }
            .console-open {
                height: 220px !important;
                opacity: 1;
                border-bottom-width: 1px !important;
                transition: height 0.35s cubic-bezier(0.2, 0.9, 0.4, 1.1), opacity 0.25s;
            }
            #sidebar {
                transition: height 0.3s ease, opacity 0.2s;
            }
        }

        /* HIGHLIGHTED INVITE URL — vibrant glow */
        .url-pill {
            background: linear-gradient(135deg, #0a2a3a, #02121f);
            backdrop-filter: blur(12px);
            transition: all 0.2s;
            border: 1px solid #0ff;
            box-shadow: 0 0 12px #0ff6;
            color: #b8f2ff !important;
            font-weight: 700;
            font-size: 0.85rem;
            padding: 0.25rem 0.9rem;
            letter-spacing: 0.3px;
        }
        .url-pill:active {
            transform: scale(0.97);
        }
        /* make the invite url container bigger and more readable */
        #invite-url {
            font-size: 0.85rem;
            background: #0a1e2acc;
            border-radius: 40px;
            font-family: 'Space Mono', monospace;
            font-weight: bold;
            text-shadow: 0 0 3px cyan;
        }

        /* status badge larger */
        .status-badge {
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(8px);
            border-radius: 60px;
            font-size: 0.75rem;
            padding: 0.4rem 1rem;
        }

        /* chat message text size boost */
        #chat-box .message-bubble div {
            font-size: 1rem !important;
            line-height: 1.45 !important;
        }
        #chat-box .message-bubble .text-\[9px\] {
            font-size: 0.75rem !important;
        }

        /* increase chat container padding for readability */
        #chat-box {
            padding: 1.5rem 1.2rem !important;
        }

        /* overall room header text bigger */
        h1 {
            font-size: 1.6rem !important;
        }
        .tracking-widest {
            letter-spacing: 0.15em;
        }

        /* input placeholder bigger */
        #message-input::placeholder {
            font-size: 0.9rem;
        }

        /* Make console log text brighter and easier */
        .log-line span {
            color: #9cdbff !important;
        }
    </style>
</head>
<body class="h-screen flex flex-col">

    <div class="cyber-grid"></div>
    <div class="cyber-glow"></div>

    <header class="relative z-20 flex justify-between items-center px-5 py-3 md:px-7 md:py-4 border-b border-cyan-500/20 bg-black/40 backdrop-blur-xl shadow-md">
        <div class="flex items-center gap-4">
            <button id="toggle-console" class="lg:hidden p-2 rounded-full bg-cyan-950/60 border border-cyan-500/40 text-cyan-400 active:scale-95 transition-all shadow-md">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M4 6h16M4 12h16m-7 6h7" />
                </svg>
            </button>
            <div>
                <h1 class="text-2xl md:text-3xl font-black tracking-widest bg-gradient-to-r from-cyan-300 to-blue-400 bg-clip-text text-transparent" style="font-family: 'Inter', sans-serif;">GHOSTWIRE</h1>
                <div id="room-display" class="text-xs md:text-sm text-slate-300 font-mono flex items-center gap-3 mt-1">
                    <span id="invite-url" class="url-pill px-3 py-1 rounded-full border-2 border-cyan-400 text-cyan-100 cursor-pointer transition-all truncate max-w-[180px] sm:max-w-[320px] text-sm font-mono font-bold shadow-cyan-500/50 shadow-sm">loading...</span>
                    <span class="hidden md:inline-block text-cyan-400/80 text-[16px] font-mono">⟡ encrypted room</span>
                </div>
            </div>
        </div>
        <div id="status" class="status-badge text-[11px] md:text-sm font-bold uppercase tracking-wider text-red-300 flex items-center gap-2 px-4 py-2 rounded-full border border-red-500/40 bg-red-950/30 shadow-md">
            <span class="relative flex h-2.5 w-2.5">
                <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-red-500 opacity-75"></span>
                <span class="relative inline-flex rounded-full h-2.5 w-2.5 bg-red-500"></span>
            </span>
            <span class="hidden sm:inline">DISCONNECTED</span><span class="sm:hidden">OFF</span>
        </div>
    </header>

    <main class="flex flex-col lg:flex-row flex-1 w-full overflow-hidden relative">
        <!-- Sidebar Console (cyber logs) -->
        <aside id="sidebar" class="w-full lg:w-80 h-0 lg:h-full border-b lg:border-b-0 lg:border-r border-cyan-500/15 glass-panel flex flex-col overflow-hidden z-10 transition-all duration-300 console-closed shrink-0">
            <div class="p-3 border-b border-cyan-500/20 bg-black/30 flex justify-between items-center">
                <h2 class="text-sm font-bold text-cyan-400 tracking-[0.3em] uppercase flex items-center gap-2">
                    <span class="inline-block w-2 h-2 bg-cyan-400 rounded-full animate-pulse"></span> 
                    SYSLOG
                </h2>
                <span class="text-[15px] text-cyan-600/70 font-mono">v.2.4.0</span>
            </div>
            <div id="log-box" class="flex-1 p-3 overflow-y-auto space-y-1.5">
                <div class="log-line text-cyan-400/70">[SYS] terminal ready</div>
            </div>
        </aside>

        <!-- Main Chat Core -->
        <div class="relative flex-1 flex flex-col overflow-hidden">
            <div class="scanline absolute top-0 left-0 w-full h-full pointer-events-none z-0 opacity-30"></div>
            
            <div id="chat-box" class="flex-1 overflow-y-auto p-5 md:p-7 space-y-5 relative z-10">
                <div id="connection-status-msg" class="flex flex-col items-center justify-center text-center py-12">
                    <div class="relative w-14 h-14 mb-5">
                        <div class="absolute inset-0 rounded-full border-2 border-cyan-500/30 animate-ping"></div>
                        <div class="absolute inset-0 rounded-full border-t-2 border-cyan-400 animate-spin"></div>
                    </div>
                    <span class="text-cyan-300/90 font-mono text-base tracking-widest uppercase animate-pulse">Establishing secure tunnel</span>
                    <span class="text-xs text-slate-400 mt-3 font-mono">WebRTC handshake in progress...</span>
                </div>
            </div>

            <!-- Message composer area - refined & larger -->
            <div class="p-4 md:p-6 bg-gradient-to-t from-black/80 via-black/50 to-transparent backdrop-blur-md border-t border-cyan-500/20 z-20">
                <form id="chat-form" class="flex gap-4 max-w-4xl mx-auto w-full items-center">
                    <div class="flex-1 relative group">
                        <span class="absolute left-4 md:left-5 top-1/2 -translate-y-1/2 text-cyan-400/80 font-mono text-base font-bold z-10">❯</span>
                        <input type="text" id="message-input" placeholder="Encrypted message ..." 
                            class="w-full bg-slate-950/80 border border-cyan-500/30 rounded-xl pl-10 md:pl-11 pr-5 py-3.5 md:py-4 focus:outline-none neon-input text-base font-mono tracking-wide text-cyan-100 placeholder:text-slate-500 transition-all">
                    </div>
                    <button type="submit" id="send-btn" class="relative overflow-hidden bg-slate-800 text-slate-300 font-bold px-6 md:px-9 py-3.5 rounded-xl border border-white/10 transition-all uppercase text-xs md:text-sm tracking-[0.2em] cursor-not-allowed shadow-md disabled:opacity-50 disabled:grayscale disabled:scale-100" disabled>
                        <span class="relative z-10">TX</span>
                        <span class="absolute inset-0 bg-gradient-to-r from-cyan-500 to-blue-600 opacity-0 transition-opacity duration-300"></span>
                    </button>
                </form>
                <div class="text-center text-[13px] text-slate-500 font-mono mt-3 flex justify-center gap-4">
                    <span>◈ E2E ENCRYPTED ◈</span>
                    <span class="hidden sm:inline-block">⛁ WEBRTC SECURE</span>
                </div>
            </div>
        </div>
    </main>

    <script src="/socket.io/socket.io.js"></script>
    <script type="module">
        import { deriveKey, encryptMessage, decryptMessage } from '../crypto.js';

        const urlParams = new URLSearchParams(window.location.search);
        const roomId = urlParams.get('room');
        const socket = io();
        let peerConnection;
        let dataChannel;
        let cryptoKey;
        let pendingCandidates = [];

        const chatBox = document.getElementById('chat-box');
        const chatForm = document.getElementById('chat-form');
        const messageInput = document.getElementById('message-input');
        const sendBtn = document.getElementById('send-btn');
        const connMsg = document.getElementById('connection-status-msg');
        const logBox = document.getElementById('log-box');
        const statusEl = document.getElementById('status');
        const inviteUrlEl = document.getElementById('invite-url');
        const toggleConsoleBtn = document.getElementById('toggle-console');
        const sidebar = document.getElementById('sidebar');

        toggleConsoleBtn.onclick = () => {
            sidebar.classList.toggle('console-closed');
            sidebar.classList.toggle('console-open');
        };

        async function init() {
            if (!roomId) {
                window.location.href = '/';
                return;
            }

            inviteUrlEl.innerText = window.location.href;
            inviteUrlEl.onclick = () => {
                navigator.clipboard.writeText(window.location.href);
                inviteUrlEl.innerText = "✓ COPIED!";
                setTimeout(() => inviteUrlEl.innerText = window.location.href, 1800);
                gsap.to(inviteUrlEl, { scale: 1.05, duration: 0.2, yoyo: true, repeat: 1 });
            };

            cryptoKey = await deriveKey(roomId);
            socket.emit('join-room', roomId);
            gsap.from("main", { opacity: 0, scale: 0.98, duration: 0.8, ease: "back.out(0.5)" });
        }

        socket.on('user-connected', (userId) => {
            createPeerConnection(userId, true);
        });

        function createPeerConnection(userId, isInitiator) {
            addLog(`P2P_INIT: Role as ${isInitiator ? 'INITIATOR' : 'RECEIVER'}`);
            addLog(`HANDSHAKE_START: Target ${userId}`);
            
            if (peerConnection) {
                peerConnection.close();
            }

            peerConnection = new RTCPeerConnection({
                iceServers: [{ urls: 'stun:stun.l.google.com:19302' }]
            });

            peerConnection.onicecandidate = (event) => {
                if (event.candidate) {
                    addLog("ICE_CANDIDATE: Propagating network path...");
                    socket.emit('signal', { to: userId, signal: event.candidate });
                }
            };

            peerConnection.onconnectionstatechange = () => {
                addLog(`STATE_CHANGE: ${peerConnection.connectionState.toUpperCase()}`);
                if (peerConnection.connectionState === 'failed' || peerConnection.connectionState === 'closed') {
                    updateStatusUI(false);
                    addLog("CRITICAL: P2P handshake failed.");
                } else if (peerConnection.connectionState === 'connected') {
                    addLog("TRANS_ACTIVE: Physical link established.");
                }
            };

            peerConnection.oniceconnectionstatechange = () => {
                addLog(`ICE_STATE: ${peerConnection.iceConnectionState.toUpperCase()}`);
            };

            if (isInitiator) {
                dataChannel = peerConnection.createDataChannel('chat');
                setupDataChannel();
                peerConnection.createOffer().then(async (offer) => {
                    addLog("SDP_OFFER: Local description generated.");
                    await peerConnection.setLocalDescription(offer);
                    socket.emit('signal', { to: userId, signal: offer });
                });
            } else {
                peerConnection.ondatachannel = (event) => {
                    dataChannel = event.channel;
                    setupDataChannel();
                };
            }
        }

        function updateStatusUI(connected) {
            if (connected) {
                statusEl.innerHTML = `
                    <span class="relative flex h-2.5 w-2.5">
                        <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-cyan-400 opacity-75"></span>
                        <span class="relative inline-flex rounded-full h-2.5 w-2.5 bg-cyan-400 shadow-[0_0_8px_#0ff]"></span>
                    </span>
                    <span class="hidden sm:inline">SECURE LINK</span><span class="sm:hidden">ON</span>
                `;
                statusEl.className = "status-badge text-[11px] md:text-sm font-bold uppercase tracking-wider text-cyan-300 flex items-center gap-2 px-4 py-2 rounded-full border border-cyan-400/50 bg-cyan-950/30 shadow-lg";
            } else {
                statusEl.innerHTML = `
                    <span class="relative flex h-2.5 w-2.5">
                        <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-red-500 opacity-75"></span>
                        <span class="relative inline-flex rounded-full h-2.5 w-2.5 bg-red-500"></span>
                    </span>
                    <span class="hidden sm:inline">DISCONNECTED</span><span class="sm:hidden">OFF</span>
                `;
                statusEl.className = "status-badge text-[11px] md:text-sm font-bold uppercase tracking-wider text-red-300 flex items-center gap-2 px-4 py-2 rounded-full border border-red-500/30 bg-red-950/20";
            }
        }

        function setupDataChannel() {
            if (!dataChannel) return;
            
            dataChannel.onopen = () => {
                addLog("CHANNEL_OPEN: DataChannel encryption ready.");
                updateStatusUI(true);
                
                sendBtn.disabled = false;
                sendBtn.classList.remove('bg-slate-800', 'text-slate-300', 'cursor-not-allowed', 'opacity-50');
                sendBtn.classList.add('btn-glow-enabled', 'text-white', 'shadow-lg');
                
                if(connMsg) {
                    gsap.to(connMsg, { opacity: 0, y: -20, duration: 0.4, onComplete: () => connMsg.remove() });
                }

                addLog("SECURE_LINK: E2EE Tunnel verified.");
            };
            dataChannel.onmessage = async (e) => {
                addLog("PACKET_RECV: Decrypting incoming stream...");
                const decrypted = await decryptMessage(JSON.parse(e.data), cryptoKey);
                addMessage('Peer', decrypted);
            };
            dataChannel.onclose = () => {
                addLog("CHANNEL_CLOSE: Link terminated.");
                updateStatusUI(false);
                sendBtn.disabled = true;
                sendBtn.classList.add('bg-slate-800', 'text-slate-300', 'cursor-not-allowed', 'opacity-50');
                sendBtn.classList.remove('btn-glow-enabled', 'text-white');
            };
            dataChannel.onerror = (error) => {
                console.error("DataChannel error:", error);
                addMessage('System', `⚠️ DataChannel error: ${error.message || 'Unknown error'}`, 'text-red-300 text-xs italic');
            };
        }

        function addLog(text) {
            const timestamp = new Date().toLocaleTimeString([], { hour12: false, hour: '2-digit', minute: '2-digit', second: '2-digit' });
            const log = document.createElement('div');
            log.className = 'log-line text-cyan-300/80 text-[13px] font-mono flex gap-2 items-start';
            log.innerHTML = `
                <span class="text-cyan-400/60 shrink-0">[${timestamp}]</span>
                <span class="break-all uppercase tracking-tighter">${text}</span>
            `;
            logBox.appendChild(log);
            logBox.scrollTop = logBox.scrollHeight;
        }

        function addMessage(sender, text, extraClass = '') {
            const isSelf = sender === 'You';
            const isSystem = sender === 'System';
            
            const div = document.createElement('div');
            div.className = `flex w-full ${isSystem ? 'justify-center' : (isSelf ? 'justify-end' : 'justify-start')} animate-fadeIn`;
            
            let bubbleClass = '';
            if (isSystem) {
                bubbleClass = 'system-message bg-black/50 backdrop-blur-sm border border-white/15 text-gray-200 text-center';
            } else {
                bubbleClass = `max-w-[85%] md:max-w-[70%] p-3.5 md:p-4 message-bubble transition-all ${isSelf ? 'bubble-tech-self' : 'bubble-tech-peer'} ${extraClass}`;
            }

            const inner = document.createElement('div');
            inner.className = bubbleClass;
            
            if (!isSystem) {
                inner.innerHTML = `
                    <div class="text-[11px] font-black uppercase tracking-wider mb-2 flex items-center gap-1 ${isSelf ? 'text-cyan-300 justify-end' : 'text-indigo-300'}">
                        ${!isSelf ? '◈ ' : ''}${sender}${isSelf ? ' ◈' : ''}
                    </div>
                    <div class="text-base md:text-lg leading-relaxed break-words tracking-wide font-medium text-gray-100">${escapeHtml(text)}</div>
                `;
            } else {
                inner.innerHTML = `<div class="text-sm font-mono text-gray-200">${escapeHtml(text)}</div>`;
            }
            
            div.appendChild(inner);
            chatBox.appendChild(div);
            chatBox.scrollTop = chatBox.scrollHeight;
            
            gsap.from(inner, { 
                y: 12, 
                scale: isSystem ? 1 : 0.97,
                opacity: 0, 
                duration: 0.3,
                ease: "back.out(0.5)"
            });
        }

        function escapeHtml(str) {
            return str.replace(/[&<>]/g, function(m) {
                if (m === '&') return '&amp;';
                if (m === '<') return '&lt;';
                if (m === '>') return '&gt;';
                return m;
            }).replace(/[\uD800-\uDBFF][\uDC00-\uDFFF]/g, function(c) {
                return c;
            });
        }

        chatForm.onsubmit = async (e) => {
            e.preventDefault();
            const text = messageInput.value.trim();
            if (!text) return;

            if (dataChannel && dataChannel.readyState === 'open') {
                try {
                    addLog("PACKET_SEND: Encrypting payload...");
                    const encrypted = await encryptMessage(text, cryptoKey);
                    dataChannel.send(JSON.stringify(encrypted));
                    addMessage('You', text);
                    messageInput.value = '';
                    gsap.to(messageInput, { scale: 1.02, duration: 0.1, yoyo: true, repeat: 1 });
                } catch (err) {
                    console.error("Encryption/Send error:", err);
                    addMessage('System', '⚠️ Encryption failed. Retry.', 'text-red-300');
                }
            } else {
                addLog("ERROR: Buffer busy or link inactive.");
                addMessage('System', '🔒 Channel not ready — waiting for secure link', 'text-amber-300/80');
            }
        };

        socket.on('signal', async (data) => {
            if (!peerConnection) createPeerConnection(data.from, false);
            
            if (data.signal && data.signal.type === 'offer') {
                addLog("SDP_RECV: Remote offer detected.");
                await peerConnection.setRemoteDescription(data.signal);
                const answer = await peerConnection.createAnswer();
                await peerConnection.setLocalDescription(answer);
                socket.emit('signal', { to: data.from, signal: answer });
                await processPendingCandidates();
            } else if (data.signal && data.signal.type === 'answer') {
                addLog("SDP_RECV: Handshake response received.");
                await peerConnection.setRemoteDescription(data.signal);
                await processPendingCandidates();
            } else if (data.signal && data.signal.candidate) {
                if (peerConnection.remoteDescription && peerConnection.remoteDescription.sdp) {
                    try {
                        await peerConnection.addIceCandidate(data.signal);
                    } catch (e) { 
                        console.error("Error adding ICE candidate directly:", e); 
                    }
                } else {
                    pendingCandidates.push(data.signal);
                }
            }
        });

        async function processPendingCandidates() {
            for (const cand of pendingCandidates) {
                try { 
                    await peerConnection.addIceCandidate(cand); 
                } catch (e) { 
                    console.error("Error adding queued ICE candidate:", e); 
                }
            }
            pendingCandidates = [];
        }
        
        init();
    </script>
</body>
