<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GhostWire | Encrypted Session</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Rajdhani:wght@300;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <style>
        :root {
            --bg-dark: #0a0a1a;
            --neon-cyan: #00e5ff;
            --neon-green: #00ff88;
            --electric-purple: #D83CF0;
            --text-light: #e0e0e0;
            --text-muted: #94a3b8;
            --card-bg-alpha: rgba(10, 15, 25, 0.85);
            --border-alpha: rgba(255, 255, 255, 0.1);
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-light);
            font-family: 'Rajdhani', sans-serif;
            height: 100vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        /* --- App Layout --- */
        .navbar {
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid var(--border-alpha);
            z-index: 100;
        }

        .brand-text {
            font-family: 'Orbitron', sans-serif;
            letter-spacing: 2px;
            background: linear-gradient(to right, var(--neon-cyan), var(--neon-green));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .main-container {
            flex: 1;
            display: flex;
            overflow: hidden;
        }

        /* --- Sidebar --- */
        .sidebar {
            width: 280px;
            background: rgba(5, 5, 15, 0.6);
            border-right: 1px solid var(--border-alpha);
            display: flex;
            flex-direction: column;
            padding: 1.5rem;
        }

        .session-info-card {
            background: var(--card-bg-alpha);
            border: 1px solid var(--border-alpha);
            padding: 1rem;
            border-radius: 12px;
            font-size: 0.9rem;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            background: var(--neon-green);
            border-radius: 50%;
            display: inline-block;
            box-shadow: 0 0 10px var(--neon-green);
            margin-right: 8px;
        }

        /* --- Custom Scrollbar --- */
        #messageDisplay::-webkit-scrollbar {
            width: 5px;
        }
        #messageDisplay::-webkit-scrollbar-track {
            background: rgba(0, 0, 0, 0.2);
        }
        #messageDisplay::-webkit-scrollbar-thumb {
            background: var(--neon-cyan);
            border-radius: 10px;
            box-shadow: 0 0 10px var(--neon-cyan);
        }

        /* --- Chat Area --- */
        .chat-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: radial-gradient(circle at center, rgba(0, 229, 255, 0.03) 0%, transparent 70%);
            position: relative;
            overflow: hidden; /* Constrain the chat area */
            min-height: 0;
        }

        #messageDisplay {
            flex: 1;
            overflow-y: auto;
            padding: 2rem;
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        /* --- Message Bubbles --- */
        .message {
            max-width: 70%;
            padding: 0.8rem 1.2rem;
            border-radius: 15px;
            position: relative;
            backdrop-filter: blur(5px);
            animation: fadeInUp 0.4s ease-out forwards;
        }

        .message.sent {
            align-self: flex-end;
            background: rgba(0, 229, 255, 0.1);
            border: 1px solid rgba(0, 229, 255, 0.3);
            border-bottom-right-radius: 2px;
        }

        .message.received {
            align-self: flex-start;
            background: rgba(216, 60, 240, 0.1);
            border: 1px solid rgba(216, 60, 240, 0.3);
            border-bottom-left-radius: 2px;
        }

        .message-meta {
            font-size: 0.7rem;
            color: var(--text-muted);
            margin-top: 5px;
            display: block;
        }

        /* --- Input Panel --- */
        .input-panel {
            padding: 1.5rem 2rem;
            background: rgba(0, 0, 0, 0.4);
            border-top: 1px solid var(--border-alpha);
        }

        .chat-input-wrapper {
            display: flex;
            gap: 1rem;
            background: var(--card-bg-alpha);
            padding: 5px;
            border-radius: 15px;
            border: 1px solid var(--border-alpha);
        }

        .chat-input-wrapper input {
            background: transparent;
            border: none;
            color: white;
            box-shadow: none !important;
        }

        /* --- Initialization Overlay --- */
        #initOverlay {
            position: fixed;
            inset: 0;
            background: var(--bg-dark);
            z-index: 2000;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <div id="initOverlay">
        <h2 class="brand-text mb-4">GHOSTWIRE SECURE TUNNEL</h2>
        <div class="progress w-25" style="height: 2px; background: rgba(255,255,255,0.1);">
            <div id="initBar" class="progress-bar" style="background: var(--neon-cyan); width: 0%"></div>
        </div>
        <p id="initStatus" class="mt-3 text-muted small text-uppercase letter-spacing-2">Initializing AES-GCM Handshake...</p>
    </div>

    <nav class="navbar">
        <div class="container-fluid px-4">
            <a class="navbar-brand brand-text fw-bold" href="../index.html">GHOSTWIRE</a>
            <div class="d-flex align-items-center">
                <span class="badge rounded-pill bg-dark border border-secondary px-3 py-2">
                    <span class="status-dot"></span> SECURE CHANNEL ACTIVE
                </span>
            </div>
        </div>
    </nav>

    <div class="main-container">
        <aside class="sidebar d-none d-md-flex">
            <h6 class="text-uppercase fw-bold small text-muted mb-3">Session Details</h6>
            <div class="session-info-card mb-4">
                <div class="mb-2"><span class="text-muted">Room:</span> <span id="roomIdLabel" class="text-info">-------</span></div>
                <div class="mb-2"><span class="text-muted">Protocol:</span> <span class="text-success">WebRTC P2P</span></div>
                <div><span class="text-muted">Encryption:</span> <span class="text-warning">AES-256-GCM</span></div>
            </div>

            <h6 class="text-uppercase fw-bold small text-muted mb-3">Participants</h6>
            <div id="peerList" class="small">
                <div class="mb-2"><i class="bi bi-person-fill me-2 text-info"></i> You (Local)</div>
                <div class="text-muted italic small mt-2">Waiting for peers...</div>
            </div>

            <div class="mt-auto">
                <button class="btn btn-outline-danger btn-sm w-100 rounded-3" onclick="window.location.href='../index.html'">
                    <i class="bi bi-power me-2"></i> TERMINATE SESSION
                </button>
            </div>
        </aside>

        <main class="chat-area">
            <div id="messageDisplay">
                <!-- Messages appear here -->
            </div>

            <div class="input-panel">
                <div class="chat-input-wrapper">
                    <input type="text" id="chatInput" class="form-control form-control-lg" placeholder="Type an encrypted message..." autocomplete="off">
                    <button class="btn btn-link text-info p-2 me-2" onclick="handleSend()">
                        <i class="bi bi-send-fill fs-4"></i>
                    </button>
                </div>
            </div>
        </main>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
    <script>
        // 1. Setup Session Data
        const urlParams = new URLSearchParams(window.location.search);
        const roomId = urlParams.get('room') || 'PUBLIC_GEN';
        document.getElementById('roomIdLabel').textContent = roomId.toUpperCase();

        // 2. Placeholder for Encryption Logic
        const GhostCrypto = {
            async encrypt(text, key) {
                // AES-GCM logic would go here
                return btoa(text); // Placeholder: Base64
            },
            async decrypt(encoded, key) {
                return atob(encoded); // Placeholder: Base64
            }
        };

        // 3. UI Handlers
        function appendMessage(text, type = 'sent') {
            const display = document.getElementById('messageDisplay');
            const msgDiv = document.createElement('div');
            msgDiv.className = `message ${type}`;
            msgDiv.innerHTML = `
                <div class="text">${text}</div>
                <span class="message-meta">${new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'})} • ENCRYPTED</span>
            `;
            display.appendChild(msgDiv);
            display.scrollTop = display.scrollHeight;
        }

        function handleSend() {
            const input = document.getElementById('chatInput');
            if (!input.value.trim()) return;
            
            appendMessage(input.value, 'sent');
            input.value = '';
            
            // Simulate response for UI demo
            setTimeout(() => {
                appendMessage("Signal received. Channel is clear.", 'received');
            }, 1000);
        }

        document.getElementById('chatInput').addEventListener('keypress', (e) => {
            if(e.key === 'Enter') handleSend();
        });

        // 4. Initialization Animation
        window.addEventListener('DOMContentLoaded', () => {
            const tl = gsap.timeline();
            tl.to("#initBar", { width: "100%", duration: 2, ease: "power2.inOut" })
              .to("#initStatus", { textContent: "Connection Established", duration: 0.5 }, "-=0.5")
              .to("#initOverlay", { opacity: 0, pointerEvents: 'none', duration: 0.8, delay: 0.2 });
            
            gsap.from(".sidebar", { x: -50, opacity: 0, duration: 1, delay: 2 });
        });
    </script>
</body>
</html>
