<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GhostWire | Secure Video Transmission</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Rajdhani:wght@300;500;700&family=Fira+Code:wght@300;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <style>
        :root {
            --bg-dark: #050510;
            --neon-cyan: #00e5ff;
            --neon-green: #00ff88;
            --neon-red: #ff0055;
            --panel-bg: rgba(10, 15, 25, 0.8);
            --avatar-bg: rgba(0, 229, 255, 0.1);
            --border-glow: rgba(0, 229, 255, 0.4);
        }

        body {
            background-color: var(--bg-dark);
            color: #ffffff;
            font-family: 'Rajdhani', sans-serif;
            height: 100vh;
            margin: 0;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        /* --- Video Environment --- */
        .video-stage {
            flex: 1;
            position: relative;
            background: #000;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .remote-video-container {
            width: 100%;
            height: 100%;
            object-fit: cover;
            filter: brightness(0.8) contrast(1.1);
        }

        #remoteVideo {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .avatar-placeholder {
            position: absolute;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            background: var(--bg-dark);
        }

        .avatar-circle {
            width: 120px;
            height: 120px;
            background: var(--avatar-bg);
            border: 2px solid var(--neon-cyan);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3rem;
            color: var(--neon-cyan);
            box-shadow: 0 0 30px var(--avatar-bg);
            animation: pulse 2s infinite;
        }

        .local-video-pip {
            position: absolute;
            top: 20px;
            right: 20px;
            width: 240px;
            aspect-ratio: 16/9;
            border: 2px solid var(--neon-cyan);
            border-radius: 12px;
            box-shadow: 0 0 20px rgba(0, 229, 255, 0.3);
            z-index: 100;
            background: #111;
            overflow: hidden;
        }

        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(0, 229, 255, 0.4); }
            70% { box-shadow: 0 0 0 20px rgba(0, 229, 255, 0); }
            100% { box-shadow: 0 0 0 0 rgba(0, 229, 255, 0); }
        }

        video {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        #localStream { transform: scaleX(-1); }

        /* --- HUD Elements --- */
        .hud-overlay {
            position: absolute;
            inset: 0;
            pointer-events: none;
            padding: 30px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            z-index: 50;
        }

        .hud-top {
            display: flex;
            justify-content: space-between;
            font-family: 'Fira Code', monospace;
            text-transform: uppercase;
            font-size: 0.8rem;
            color: var(--neon-cyan);
            text-shadow: 0 0 5px var(--neon-cyan);
        }

        .scanline {
            position: absolute;
            width: 100%;
            height: 2px;
            background: rgba(0, 229, 255, 0.1);
            top: 0;
            z-index: 60;
            animation: scan 4s linear infinite;
        }

        @keyframes scan {
            0% { top: 0; }
            100% { top: 100%; }
        }

        /* --- Tactical Controls --- */
        .control-bar {
            position: absolute;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 20px;
            padding: 15px 30px;
            background: var(--panel-bg);
            backdrop-filter: blur(15px);
            border: 1px solid var(--border-glow);
            border-radius: 50px;
            z-index: 200;
            pointer-events: all;
        }

        .btn-action {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            border: 1px solid rgba(255, 255, 255, 0.1);
            background: rgba(255, 255, 255, 0.05);
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
            transition: all 0.3s ease;
        }

        .btn-action:hover {
            background: var(--neon-cyan);
            color: #000;
            box-shadow: 0 0 20px var(--neon-cyan);
            transform: translateY(-3px);
        }

        .btn-end {
            background: rgba(255, 0, 85, 0.2);
            border-color: var(--neon-red);
            color: var(--neon-red);
        }

        .btn-end:hover {
            background: var(--neon-red);
            color: white;
            box-shadow: 0 0 25px var(--neon-red);
        }

        .status-pill {
            background: rgba(0, 255, 136, 0.1);
            border: 1px solid var(--neon-green);
            color: var(--neon-green);
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.75rem;
            letter-spacing: 1px;
        }

        @media (max-width: 768px) {
            .local-video-pip {
                width: 140px;
                bottom: 120px;
                top: auto;
                right: 20px;
            }
            .control-bar {
                width: 90%;
                justify-content: center;
                gap: 10px;
                bottom: 20px;
            }
        }
    </style>
</head>
<body>

    <div class="video-stage">
        <div class="scanline"></div>
        
        <!-- Remote Participant (Mocking with a placeholder dark div) -->
        <div class="remote-video-container">
            <video id="remoteVideo" autoplay playsinline></video>
            <div id="remoteAvatar" class="avatar-placeholder d-none">
                <div class="avatar-circle">
                    <i class="bi bi-person-fill"></i>
                </div>
                <p class="mt-3 text-cyan font-monospace small">REMOTE_VOICE_FEED</p>
            </div>
        </div>

        <!-- Local Participant PIP -->
        <div class="local-video-pip">
            <video id="localStream" autoplay playsinline muted></video>
            <div id="localAvatar" class="avatar-placeholder d-none">
                <div class="avatar-circle" style="width: 60px; height: 60px; font-size: 1.5rem;">
                    <i class="bi bi-person-fill"></i>
                </div>
            </div>
            <div class="position-absolute bottom-0 start-0 p-2 small w-100 bg-dark bg-opacity-50" style="font-size: 0.6rem;">
                LOCAL_FEED // 1080p
            </div>
        </div>

        <!-- HUD -->
        <div class="hud-overlay">
            <div class="hud-top">
                <div>
                    <i class="bi bi-record-circle text-danger me-2"></i> 
                    SIGNAL: <span id="signalStrength">98%</span>
                </div>
                <div class="text-end">
                    GHOSTWIRE // AES-256-GCM<br>
                    LATENCY: <span id="latency">24ms</span>
                </div>
            </div>

            <div class="d-flex justify-content-between align-items-end">
                <div class="status-pill">
                    <i class="bi bi-shield-lock-fill me-1"></i> E2E ENCRYPTED
                </div>
                <div class="text-main small font-monospace opacity-50">
                    FR_ID: GW-992-TX
                </div>
            </div>
        </div>

        <!-- Control Bar -->
        <div class="control-bar">
            <button class="btn-action" id="toggleMic" onclick="toggleControl('mic', this)">
                <i class="bi bi-mic-fill"></i>
            </button>
            <button class="btn-action" id="toggleCam" onclick="toggleControl('cam', this)">
                <i class="bi bi-camera-video-fill"></i>
            </button>
            <button class="btn-action" title="Share Screen">
                <i class="bi bi-display"></i>
            </button>
            <button class="btn-action btn-end" onclick="handleHangup()">
                <i class="bi bi-telephone-x-fill"></i>
            </button>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
    <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
    <script>
        let localStream;
        let peerConnection;
        let pendingCandidates = [];
        const socket = io({
            transports: ["websocket"]
        });

        const urlParams = new URLSearchParams(window.location.search);
        const callType = urlParams.get('type') || 'video';
        const roomId = urlParams.get('room');

        const iceConfig = { 
            iceServers: [
                { urls: 'stun:stun.l.google.com:19302' },
                { urls: 'stun:stun1.l.google.com:19302' },
                { urls: 'stun:stun2.l.google.com:19302' },
                { urls: 'stun:stun.services.mozilla.com' },
                { urls: 'stun:stun.l.google.com:19305' },
                // ADD YOUR TURN SERVER HERE (replace placeholders)
                // Example with a placeholder TURN server:
                // {
                //     urls: "turn:YOUR_TURN_SERVER_URL:3478",
                //     username: "YOUR_TURN_USERNAME",
                //     credential: "YOUR_TURN_PASSWORD"
                // }
            ] 
        };

        async function processPendingCandidates() {
            for (const cand of pendingCandidates) {
                try {
                    await peerConnection.addIceCandidate(new RTCIceCandidate(cand));
                } catch (e) {
                    console.error("Error adding queued ICE candidate:", e);
                }
            }
            pendingCandidates = [];
        }

        async function initCall() {
            try {
                const constraints = { 
                    audio: true, 
                    video: callType === 'video' 
                };
                localStream = await navigator.mediaDevices.getUserMedia(constraints);
                document.getElementById('localStream').srcObject = localStream;

                // Announce call initiation to the main room
                socket.emit('call-initiated', { roomId: roomId, callType: callType, from: socket.id });

                // Handle Initial Voice Mode UI
                if (callType === 'voice') {
                    document.getElementById('localAvatar').classList.remove('d-none');
                    document.getElementById('localStream').classList.add('d-none');
                    document.getElementById('remoteAvatar').classList.remove('d-none');
                    document.getElementById('remoteVideo').classList.add('d-none');
                    
                    const camBtn = document.getElementById('toggleCam');
                    camBtn.classList.add('text-danger');
                    camBtn.querySelector('i').className = 'bi bi-camera-video-off-fill';
                }

                if (roomId) {
                    // Join a separate sub-room for the call signaling
                    socket.emit('join-room', roomId + '_call');

                    socket.on('user-connected', (userId) => {
                        createPeerConnection(userId, true);
                    });

                    // Handle the other user leaving the signaling room
                    socket.on('user-disconnected', (userId) => {
                        handleHangup();
                    });

                    socket.on('signal', async (data) => {
                        if (!peerConnection) createPeerConnection(data.from, false);

                        if (data.signal.type === 'offer') {
                            await peerConnection.setRemoteDescription(new RTCSessionDescription(data.signal));
                            const answer = await peerConnection.createAnswer();
                            await peerConnection.setLocalDescription(answer);
                            socket.emit('signal', { to: data.from, signal: answer });
                            await processPendingCandidates();
                        } else if (data.signal.type === 'answer') {
                            await peerConnection.setRemoteDescription(new RTCSessionDescription(data.signal));
                            await processPendingCandidates();
                        } else if (data.signal.candidate) {
                            if (peerConnection && peerConnection.remoteDescription && peerConnection.remoteDescription.type) {
                                await peerConnection.addIceCandidate(new RTCIceCandidate(data.signal.candidate));
                            } else {
                                pendingCandidates.push(data.signal.candidate);
                            }
                        }
                    });
                }
            } catch (err) {
                console.error("Error accessing media devices.", err);
            }
        }

        function createPeerConnection(userId, isInitiator) {
            peerConnection = new RTCPeerConnection(iceConfig);
            
            localStream.getTracks().forEach(track => peerConnection.addTrack(track, localStream));

            peerConnection.ontrack = (event) => {
                const remoteVideo = document.getElementById('remoteVideo');
                if (remoteVideo.srcObject !== event.streams[0]) {
                    remoteVideo.srcObject = event.streams[0];
                    document.getElementById('remoteAvatar').classList.add('d-none');
                    document.getElementById('remoteVideo').classList.remove('d-none');
                }
            };

            peerConnection.onicecandidate = (event) => {
                if (event.candidate) {
                    socket.emit('signal', { to: userId, signal: { candidate: event.candidate } });
                }
            };

            if (isInitiator) {
                peerConnection.createOffer().then(async (offer) => {
                    await peerConnection.setLocalDescription(offer);
                    socket.emit('signal', { to: userId, signal: offer });
                });
            }
        }

        function handleHangup() {
            if (socket && roomId) {
                socket.emit('call-ended', { roomId: roomId });
            }

            if (localStream) {
                localStream.getTracks().forEach(track => track.stop());
            }
            if (peerConnection) {
                peerConnection.close();
            }
            if (window.opener) {
                window.close();
            } else {
                window.location.href = '../index.html';
            }
        }

        function toggleControl(type, btn) {
            if (!localStream) return;

            if (type === 'mic') {
                const audioTrack = localStream.getAudioTracks()[0];
                if (audioTrack) {
                    audioTrack.enabled = !audioTrack.enabled;
                    btn.classList.toggle('text-danger', !audioTrack.enabled);
                    btn.querySelector('i').className = audioTrack.enabled ? 'bi bi-mic-fill' : 'bi-mic-mute-fill';
                }
            } else if (type === 'cam') {
                const videoTrack = localStream.getVideoTracks()[0];
                const videoElement = document.getElementById('localStream');
                const avatarElement = document.getElementById('localAvatar');

                if (videoTrack) {
                    videoTrack.enabled = !videoTrack.enabled;
                    videoElement.classList.toggle('d-none', !videoTrack.enabled);
                    avatarElement.classList.toggle('d-none', videoTrack.enabled);
                    
                    btn.classList.toggle('text-danger', !videoTrack.enabled);
                    btn.querySelector('i').className = videoTrack.enabled ? 'bi bi-camera-video-fill' : 'bi-camera-video-off-fill';
                } else if (callType === 'voice') {
                    // Feedback for attempting to turn on cam in voice-only session
                    console.warn("Session started as Voice Only. Re-negotiation required.");
                }
            }
            
            // Animation feedback
            gsap.from(btn, { scale: 0.8, duration: 0.2, ease: "back.out(2)" });
        }

        // Entry Animations
        document.addEventListener('DOMContentLoaded', () => {
            initCall();

            const tl = gsap.timeline();
            tl.from(".hud-top", { y: -20, opacity: 0, duration: 0.8 })
              .from(".local-video-pip", { x: 50, opacity: 0, duration: 0.8 }, "-=0.4")
              .from(".control-bar", { y: 50, opacity: 0, duration: 1, ease: "power4.out" }, "-=0.6");

            // Simulate fluctuating latency
            setInterval(() => {
                const lat = Math.floor(Math.random() * (35 - 20) + 20);
                document.getElementById('latency').textContent = lat + 'ms';
            }, 3000);
        });
    </script>
</body>
</html>
